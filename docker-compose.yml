version: "3.9"

services:
  # ── Backend FastAPI ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nomina_backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./logs:/app/logs
      # En Windows: mapear carpeta de red previamente montada como unidad
      # Ejemplo: montar \\192.168.0.13\fs_sumimedical en Z: con 'net use'
      # y luego: - Z:\SUBGERENCIA ADMINISTRATIVA Y FINANCIERA\...:/mnt/network_share:ro
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - nomina_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Base de datos PostgreSQL ───────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: nomina_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nomina_dashboard}
      POSTGRES_USER: ${POSTGRES_USER:-nomina_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks:
      - nomina_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nomina_user} -d ${POSTGRES_DB:-nomina_dashboard}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Frontend / Proxy Nginx ────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: nomina_nginx
    restart: unless-stopped
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - nomina_net

  # ── Redis (cache y Celery) ────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nomina_redis
    restart: unless-stopped
    networks:
      - nomina_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  postgres_data:

networks:
  nomina_net:
    driver: bridge
