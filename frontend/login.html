<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NóminaBoard — Iniciar Sesión</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body class="login-bg">

  <div class="login-card">
    <div style="text-align:center;margin-bottom:24px">
      <div class="brand-icon">📊</div>
      <h1>NóminaBoard</h1>
      <p class="tagline">Dashboard de Novedades de Nómina · Sumimedical</p>
    </div>

    <div class="alert-error" id="alert-box" role="alert">
      <i class="bi bi-exclamation-triangle-fill"></i>
      <span id="alert-msg"></span>
    </div>

    <form id="login-form" novalidate>
      <div class="form-field">
        <label for="username">Usuario</label>
        <div class="input-wrap">
          <i class="bi bi-person"></i>
          <input type="text" id="username" placeholder="nombre.usuario" autocomplete="username" required />
        </div>
      </div>
      <div class="form-field">
        <label for="password">Contraseña</label>
        <div class="input-wrap">
          <i class="bi bi-lock"></i>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
          <button type="button" class="btn-pw-toggle" id="toggle-pw" tabindex="-1">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-login" id="btn-submit">
        <span id="btn-text"><i class="bi bi-box-arrow-in-right"></i> Ingresar</span>
        <span id="btn-spin" style="display:none">
          <span class="spinner" style="border-color:rgba(255,255,255,.3);border-top-color:#fff;width:16px;height:16px;border-width:2px"></span>
          Verificando...
        </span>
      </button>
    </form>

    <p style="text-align:center;font-size:.75rem;color:var(--muted);margin-top:24px;margin-bottom:0">
      <i class="bi bi-shield-lock me-1"></i> Acceso restringido al personal autorizado
    </p>
  </div>

  <script src="js/api.js?v=20260720b"></script>
  <script>
    document.getElementById('toggle-pw').addEventListener('click', () => {
      const pw = document.getElementById('password');
      const icon = document.querySelector('#toggle-pw i');
      if (pw.type === 'password') { pw.type = 'text'; icon.className = 'bi bi-eye-slash'; }
      else { pw.type = 'password'; icon.className = 'bi bi-eye'; }
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const alertBox = document.getElementById('alert-box');
      alertBox.style.display = 'none';
      document.getElementById('btn-text').style.display = 'none';
      document.getElementById('btn-spin').style.display = 'flex';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        // API.login() ya vive en api.js -- reusarlo evita duplicar el
        // fetch a mano y mantiene un solo lugar que sabe hablarle a
        // /api/auth/token.
        const data = await API.login(username, password);
        storeSession(data); // access_token + refresh_token + token_expires_at, arma el timer
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = 'dashboard.html';
      } catch (err) {
        document.getElementById('alert-msg').textContent = err.message;
        alertBox.style.display = 'flex';
        document.getElementById('btn-text').style.display = 'flex';
        document.getElementById('btn-spin').style.display = 'none';
      }
    });

    if (localStorage.getItem('token')) window.location.href = 'dashboard.html';
  </script>
</body>
</html>
